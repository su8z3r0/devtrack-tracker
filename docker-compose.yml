version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: devtrack-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - devtrack-network
    depends_on:
      - db
      - cache
      - mail

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: devtrack-web
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - devtrack-network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: devtrack-db
    environment:
      MYSQL_DATABASE: devtrack
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: devtrack
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - devtrack-network

  # Redis Cache & Queue
  cache:
    image: redis:alpine
    container_name: devtrack-redis
    ports:
      - "6379:6379"
    volumes:
      - cachedata:/data
    networks:
      - devtrack-network

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: devtrack-queue
    command: php artisan queue:work --sleep=3 --tries=3
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - devtrack-network
    depends_on:
      - db
      - cache

  # ChromaDB for AI Embeddings
  chroma:
    image: chromadb/chroma:latest
    container_name: devtrack-chroma
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma
    networks:
      - devtrack-network

  # Mailhog for Email Testing
  mail:
    image: mailhog/mailhog
    container_name: devtrack-mail
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - devtrack-network

  # Node.js for Asset Building (optional)
  node:
    image: node:20-alpine
    container_name: devtrack-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run dev"
    networks:
      - devtrack-network
    profiles:
      - dev

  # Terminal sandbox for DevTrack learning
  terminal:
    build:
      context: ./terminal
      dockerfile: Dockerfile
    container_name: devtrack-terminal
    networks:
      - devtrack-network
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # WebSocket bridge to terminal sandbox
  ws-server:
    build:
      context: ./terminal
      dockerfile: Dockerfile
    container_name: devtrack-ws-server
    ports:
      - "3001:3001"
    networks:
      - devtrack-network
    environment:
      - PORT=3001
      - CONTAINER_NAME=devtrack-terminal
    working_dir: /app
    volumes:
      - ./terminal:/app
    command: ["sh", "-c", "npm install && node ws-server.js"]
    depends_on:
      - terminal
    restart: unless-stopped

networks:
  devtrack-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  cachedata:
    driver: local
  chromadata:
    driver: local
